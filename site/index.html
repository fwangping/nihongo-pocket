<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f6efe2" />
    <meta
      name="description"
      content="Nihongo Pocket 是一个可在手机访问的日语学习 PWA，覆盖五十音、单词闪卡、语法熟悉和阶段进度。"
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./app.css" />
    <title>Nihongo Pocket</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Mobile Japanese Study</p>
          <h1>Nihongo Pocket</h1>
          <p class="hero-text">
            从五十音到 JLPT N2 的随身学习小工具。今天学一点，明天就能继续，无论你是在手机、平板还是电脑上。
          </p>
        </div>
        <div class="hero-stats" id="hero-stats"></div>
      </header>

      <main>
        <section class="panel roadmap-panel">
          <div class="section-title">
            <h2>学习路径</h2>
            <p>先打基础，再进入词汇与语法并行训练。</p>
          </div>
          <div class="roadmap" id="roadmap"></div>
        </section>

        <nav class="tabbar" aria-label="Study sections">
          <button class="tab active" data-tab="kana">五十音</button>
          <button class="tab" data-tab="flashcards">闪卡</button>
          <button class="tab" data-tab="grammar">语法</button>
          <button class="tab" data-tab="progress">进度</button>
        </nav>

        <section class="tab-panel active" data-panel="kana">
          <div class="panel">
            <div class="section-title">
              <h2>五十音起步</h2>
              <p>先熟悉平假名和片假名，再进入单词和语法。</p>
            </div>
            <div class="kana-toolbar">
              <button class="chip active" data-kana-filter="hiragana">平假名</button>
              <button class="chip" data-kana-filter="katakana">片假名</button>
            </div>
            <div class="kana-grid" id="kana-grid"></div>
          </div>
        </section>

        <section class="tab-panel" data-panel="flashcards">
          <div class="panel">
            <div class="section-title">
              <h2>单词闪卡</h2>
              <p>按阶段筛选，点击卡片翻面，然后标记“记住了”或“再来一次”。</p>
            </div>
            <div class="filter-row" id="flashcard-filters"></div>
            <article class="flashcard" id="flashcard" aria-live="polite"></article>
            <div class="review-actions">
              <button class="ghost" id="flip-card">翻面</button>
              <button class="danger" id="again-card">再来一次</button>
              <button class="success" id="know-card">记住了</button>
              <button class="ghost" id="next-card">下一张</button>
            </div>
          </div>
        </section>

        <section class="tab-panel" data-panel="grammar">
          <div class="panel">
            <div class="section-title">
              <h2>语法熟悉</h2>
              <p>每条语法都附带含义、结构和例句，便于复习和建立语感。</p>
            </div>
            <div class="filter-row" id="grammar-filters"></div>
            <div class="grammar-list" id="grammar-list"></div>
          </div>
        </section>

        <section class="tab-panel" data-panel="progress">
          <div class="panel">
            <div class="section-title">
              <h2>学习进度</h2>
              <p>当前版本保存在本机浏览器，之后可以接 Cloudflare D1 做跨设备同步。</p>
            </div>
            <div class="progress-cards" id="progress-cards"></div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
